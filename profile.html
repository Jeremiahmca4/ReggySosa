<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reggy Sosa | Team Profile</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reggy Sosa" />
  <meta name="theme-color" content="#ffc72c" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo.png" type="image/png" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <img src="logo.png" alt="Reggy Sosa logo" class="logo-img" />
        <span>Reggy&nbsp;Sosa</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="merch.html">Merch</a></li>
        <li id="profile-nav" style="display:none;"><a href="profile.html">Profile</a></li>
        <li><a href="admin.html" id="admin-nav">Admin</a></li>
      </ul>
      <div class="auth-links" id="auth-links"></div>
    </nav>
  </header>
  <main class="container profile-page">
    <!-- Built dynamically by buildProfileEditor() in script.js -->
    <div id="profile-loading" style="color:var(--text-muted);padding:3rem 0">Loading profile...</div>
  </main>
  <footer>
    <p>&copy; <span id="year"></span> Reggy Sosa. All rights reserved.</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.3.0/dist/umd/supabase.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    window.addEventListener('DOMContentLoaded', async function () {
      if (typeof syncSession === 'function') await syncSession();
      populateAuthLinks();
      if (typeof syncTeamsFromBackend === 'function') await syncTeamsFromBackend();
      // Build the editor UI
      const loading = document.getElementById('profile-loading');
      if (loading) loading.remove();
      if (typeof buildProfileEditor === 'function') buildProfileEditor();
      // Load existing values into the editor
      if (typeof loadProfile === 'function') await loadProfile();
    });
  </script>

  <!-- PWA bottom tab bar (mobile only) -->
  <nav class="mobile-tab-bar" id="mobile-tab-bar">
    <a href="index.html" class="tab-item" data-tab="index">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a href="tournaments.html" class="tab-item" data-tab="tournaments">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span>Tournaments</span>
    </a>
    <a href="profile.html" class="tab-item" id="tab-profile" style="display:none;" data-tab="profile">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </a>
    <a href="merch.html" class="tab-item" data-tab="merch">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span>Merch</span>
    </a>
    <a href="rules.html" class="tab-item" data-tab="rules">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>Rules</span>
    </a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
    // Mark active tab
    (function() {
      var path = window.location.pathname.split('/').pop().replace('.html','') || 'index';
      document.querySelectorAll('.tab-item').forEach(function(el) {
        if (el.dataset.tab === path) el.classList.add('tab-item--active');
      });
      // Show profile tab only when logged in
      var profileTab = document.getElementById('tab-profile');
      if (profileTab) {
        var user = localStorage.getItem('currentUser');
        if (user) profileTab.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
